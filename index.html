<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>指文字 Collector v2</title>
<link rel="icon" href="data:,">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;overflow:hidden;}

  /* ── レイアウト ── */
  .app{display:flex;height:100vh;}
  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .sidebar{width:280px;background:#16213e;border-left:1px solid #0f3460;display:flex;flex-direction:column;min-height:0;overflow:hidden;}

  /* ── ヘッダー ── */
  .header{padding:8px 16px;background:#0f3460;display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .header h1{font-size:15px;font-weight:700;color:#e94560;}
  .header .tag{font-size:11px;padding:2px 8px;border-radius:10px;background:#e94560;color:#fff;font-weight:600;}

  /* ── ビデオエリア ── */
  .video-area{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .video-area video{display:none;}
  .video-area canvas{width:100%;height:100%;object-fit:contain;}

  /* ── ビデオオーバーレイ ── */
  .overlay-label{position:absolute;top:12px;left:12px;font-size:28px;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.8);pointer-events:none;}
  .overlay-label .kana{font-size:40px;}
  .overlay-label .sub{font-size:14px;opacity:0.7;display:block;}
  .overlay-count{position:absolute;top:12px;right:12px;font-size:16px;font-weight:700;color:#4ecca3;text-shadow:0 2px 6px rgba(0,0,0,0.8);text-align:right;pointer-events:none;}
  .overlay-count .num{font-size:32px;display:block;}
  .overlay-status{position:absolute;bottom:12px;left:12px;right:12px;font-size:12px;color:#aaa;font-family:monospace;text-shadow:0 1px 4px rgba(0,0,0,0.8);pointer-events:none;}
  .overlay-type{position:absolute;top:60px;left:12px;font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600;pointer-events:none;}
  .overlay-type.static{background:rgba(33,150,243,0.8);color:#fff;}
  .overlay-type.motion{background:rgba(76,175,80,0.8);color:#fff;}

  /* カウントダウン */
  .countdown-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:10;pointer-events:none;}
  .countdown-overlay .cd-num{font-size:120px;font-weight:900;color:#e94560;text-shadow:0 0 40px rgba(233,69,96,0.6);animation:cdPulse 1s ease-in-out infinite;}
  @keyframes cdPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
  .countdown-overlay.hidden{display:none;}

  /* 録画フラッシュ */
  .rec-flash{position:absolute;inset:0;background:rgba(76,255,170,0.15);pointer-events:none;opacity:0;transition:opacity 0.1s;}

  /* リズムリングオーバーレイ */
  .rhythm-ring-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;display:flex;align-items:center;justify-content:center;}
  .rhythm-ring-overlay.hidden{display:none;}
  .rhythm-ring-label{position:absolute;font-size:28px;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.6);text-align:center;pointer-events:none;}

  /* ── サイドバー：グリッド ── */
  .grid-header{padding:10px 12px;font-size:13px;font-weight:700;color:#e94560;border-bottom:1px solid #0f3460;flex-shrink:0;}
  .grid-scroll{flex:1;overflow-y:auto;padding:6px;}
  .grid-scroll::-webkit-scrollbar{width:4px;}
  .grid-scroll::-webkit-scrollbar-thumb{background:#0f3460;border-radius:2px;}

  .grid-row{margin-bottom:4px;}
  .grid-row-label{font-size:9px;color:#666;padding:0 2px;margin-bottom:1px;}
  .grid-row-items{display:flex;flex-wrap:wrap;gap:2px;}

  .g-btn{width:30px;height:30px;border:1px solid #0f3460;border-radius:4px;background:#1a1a2e;color:#e0e0e0;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;position:relative;font-weight:600;}
  .g-btn:hover{background:#0f3460;border-color:#e94560;}
  .g-btn.active{background:#e94560;color:#fff;border-color:#e94560;box-shadow:0 0 8px rgba(233,69,96,0.4);}
  .g-btn.done{background:#2a2a3e;color:#555;border-color:#333;}
  .g-btn.done::after{content:'✓';position:absolute;font-size:7px;bottom:0;right:1px;color:#4ecca3;}
  .g-btn.motion-type{border-left:2px solid #4caf50;}

  /* ── サイドバー：オプション ── */
  .opts-toggle{padding:8px 12px;font-size:12px;font-weight:600;color:#aaa;border-top:1px solid #0f3460;cursor:pointer;flex-shrink:0;user-select:none;}
  .opts-toggle:hover{color:#e94560;}
  .opts-panel{padding:8px 12px;border-top:1px solid #0f3460;overflow-y:auto;transition:max-height 0.3s;font-size:11px;}
  .opts-panel.collapsed{max-height:0!important;padding:0 12px;border:none;overflow:hidden;}
  .opts-panel label{display:block;margin:4px 0;color:#aaa;}
  .opts-panel input,.opts-panel select{background:#1a1a2e;border:1px solid #0f3460;color:#e0e0e0;padding:3px 6px;border-radius:4px;font-size:11px;width:70px;}
  .opts-panel select.wide{width:160px;}

  /* ── 下部バー ── */
  .bottom-bar{padding:6px 16px;background:#0f3460;display:flex;align-items:center;gap:12px;flex-shrink:0;font-size:12px;}
  .bottom-bar button{padding:5px 14px;border:1px solid #e94560;background:transparent;color:#e94560;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;transition:all 0.15s;}
  .bottom-bar button:hover{background:#e94560;color:#fff;}
  .bottom-bar button:disabled{opacity:0.3;cursor:not-allowed;}
  .bottom-bar button.primary{background:#e94560;color:#fff;}
  .bottom-bar button.primary:hover{background:#c73a52;}
  .bottom-bar .spacer{flex:1;}
  .bottom-bar .info{color:#888;font-family:monospace;}

  /* 進捗バー */
  .progress-wrap{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.1);}
  .progress-bar{height:100%;background:#4ecca3;transition:width 0.2s;width:0%;}
</style>
</head>
<body>
<div class="app">
  <!-- メインエリア -->
  <div class="main">
    <div class="header">
      <h1>🖐️ 指文字 Collector</h1>
      <span class="tag">v2</span>
    </div>

    <div class="video-area" id="videoArea">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="canvas"></canvas>

      <!-- オーバーレイ -->
      <div class="overlay-label" id="olLabel"><span class="kana">あ</span><span class="sub">a ─ 静止型</span></div>
      <div class="overlay-count" id="olCount"><span class="num">0</span>/ <span id="olGoal">50</span></div>
      <div class="overlay-type static" id="olType">静止型</div>
      <div class="overlay-status" id="olStatus">▶️ カメラ開始 で収集スタート</div>

      <!-- カウントダウン -->
      <div class="countdown-overlay hidden" id="cdOverlay"><div class="cd-num" id="cdNum">3</div></div>

      <!-- 録画フラッシュ -->
      <div class="rec-flash" id="recFlash"></div>

      <!-- リズムリング（映像上にオーバーレイ） -->
      <div class="rhythm-ring-overlay hidden" id="rhythmOl">
        <svg width="160" height="160" viewBox="0 0 160 160">
          <!-- 背景リング（薄いガイド） -->
          <circle cx="80" cy="80" r="68" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="10"/>
          <!-- インターバル（紫） -->
          <circle id="ringInterval" cx="80" cy="80" r="68" fill="none"
                  stroke="#bb86fc" stroke-width="10" stroke-linecap="round"
                  stroke-dasharray="427.3" stroke-dashoffset="427.3"
                  style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 0.05s linear;"/>
          <!-- 撮影時間（薄緑） -->
          <circle id="ringRecord" cx="80" cy="80" r="68" fill="none"
                  stroke="#4ecca3" stroke-width="10" stroke-linecap="round"
                  stroke-dasharray="427.3" stroke-dashoffset="427.3"
                  style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 0.05s linear;"/>
        </svg>
        <div class="rhythm-ring-label" id="ringLabel">●</div>
      </div>

      <!-- 進捗バー -->
      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <div class="bottom-bar">
      <button class="primary" id="btnStart">▶️ カメラ開始</button>
      <button id="btnStop" disabled>⏹ 停止</button>
      <button id="btnRhythm" disabled>🎵 リズム</button>
      <span class="info" id="bottomInfo">Ready</span>
      <span class="spacer"></span>
      <button id="btnDownload" disabled>💾 DL</button>
      <button id="btnClear" disabled>🗑</button>
    </div>
  </div>

  <!-- サイドバー -->
  <div class="sidebar">
    <div class="grid-header">取得対象 ─ 指文字 <span id="gridProgress">0/82</span></div>
    <div class="grid-scroll" id="gridScroll"></div>

    <div class="opts-toggle" id="optsToggle">⚙ オプション ▾</div>
    <div class="opts-panel" id="optsPanel" style="max-height:40vh;">
      <label>カメラ <select id="cameraSelect" class="wide"><option value="">検出中...</option></select></label>
      <label>目標数 <input id="goalCount" type="number" value="50" min="10" max="1000" step="10"/></label>
      <label>カウントダウン(秒) <input id="countdownSec" type="number" value="3" min="0" max="10" step="1"/></label>
      <label>開始前安定(秒) <input id="preStableSec" type="number" value="3" min="0" max="10" step="0.5"/></label>
      <label>手検出閾値 <input id="handTh" type="number" value="0.80" min="0" max="1" step="0.05"/></label>
      <label>録画時間(ms) <input id="recordMs" type="number" value="500" min="300" max="1000" step="50"/></label>
      <label>クールダウン(ms) <input id="cooldown" type="number" value="150" min="50" max="2000" step="50"/></label>
      <label>安定フレーム数 <input id="stableFrames" type="number" value="8" min="3" max="30"/></label>
      <label>安定判定閾値 <input id="stableTh" type="number" value="0.025" min="0.01" max="0.1" step="0.005"/></label>
      <label>リズム間隔(ms) <input id="rhythmInterval" type="number" value="1500" min="800" max="4000" step="100"/></label>
      <label>表示ミラー <select id="mirrorView"><option value="on" selected>ON</option><option value="off">OFF</option></select></label>
      <label>特徴量ミラー <select id="mirrorForModel"><option value="on" selected>ON</option><option value="off">OFF</option></select></label>
      <label>右手のみ <select id="rightOnly"><option value="on" selected>ON</option><option value="off">OFF</option></select></label>
    </div>
  </div>
</div>

<script type="module">
import * as vision from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.21/vision_bundle.mjs";
const { HandLandmarker, FilesetResolver } = vision;
const MODEL_URL = "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task";
const WASM_BASE = "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.21/wasm";

// ══════════════════════════════════════
// データ定義
// ══════════════════════════════════════
const LABELS = [
  // [key, display, rowLabel]
  {key:'a',d:'あ',r:'あ行'},{key:'i',d:'い',r:'あ行'},{key:'u',d:'う',r:'あ行'},{key:'e',d:'え',r:'あ行'},{key:'o',d:'お',r:'あ行'},
  {key:'ka',d:'か',r:'か行'},{key:'ki',d:'き',r:'か行'},{key:'ku',d:'く',r:'か行'},{key:'ke',d:'け',r:'か行'},{key:'ko',d:'こ',r:'か行'},
  {key:'sa',d:'さ',r:'さ行'},{key:'shi',d:'し',r:'さ行'},{key:'su',d:'す',r:'さ行'},{key:'se',d:'せ',r:'さ行'},{key:'so',d:'そ',r:'さ行'},
  {key:'ta',d:'た',r:'た行'},{key:'chi',d:'ち',r:'た行'},{key:'tsu',d:'つ',r:'た行'},{key:'te',d:'て',r:'た行'},{key:'to',d:'と',r:'た行'},
  {key:'na',d:'な',r:'な行'},{key:'ni',d:'に',r:'な行'},{key:'nu',d:'ぬ',r:'な行'},{key:'ne',d:'ね',r:'な行'},{key:'no',d:'の',r:'な行'},
  {key:'ha',d:'は',r:'は行'},{key:'hi',d:'ひ',r:'は行'},{key:'fu',d:'ふ',r:'は行'},{key:'he',d:'へ',r:'は行'},{key:'ho',d:'ほ',r:'は行'},
  {key:'ma',d:'ま',r:'ま行'},{key:'mi',d:'み',r:'ま行'},{key:'mu',d:'む',r:'ま行'},{key:'me',d:'め',r:'ま行'},{key:'mo',d:'も',r:'ま行'},
  {key:'ya',d:'や',r:'や行'},{key:'yu',d:'ゆ',r:'や行'},{key:'yo',d:'よ',r:'や行'},
  {key:'ra',d:'ら',r:'ら行'},{key:'ri',d:'り',r:'ら行'},{key:'ru',d:'る',r:'ら行'},{key:'re',d:'れ',r:'ら行'},{key:'ro',d:'ろ',r:'ら行'},
  {key:'wa',d:'わ',r:'わ行'},{key:'wo',d:'を',r:'わ行'},{key:'n',d:'ん',r:'わ行'},{key:'bar',d:'ー',r:'わ行'},{key:'X',d:'X',r:'わ行'},
  {key:'ga',d:'が',r:'が行'},{key:'gi',d:'ぎ',r:'が行'},{key:'gu',d:'ぐ',r:'が行'},{key:'ge',d:'げ',r:'が行'},{key:'go',d:'ご',r:'が行'},
  {key:'za',d:'ざ',r:'ざ行'},{key:'ji',d:'じ',r:'ざ行'},{key:'zu',d:'ず',r:'ざ行'},{key:'ze',d:'ぜ',r:'ざ行'},{key:'zo',d:'ぞ',r:'ざ行'},
  {key:'da',d:'だ',r:'だ行'},{key:'di',d:'ぢ',r:'だ行'},{key:'du',d:'づ',r:'だ行'},{key:'de',d:'で',r:'だ行'},{key:'do',d:'ど',r:'だ行'},
  {key:'ba',d:'ば',r:'ば行'},{key:'bi',d:'び',r:'ば行'},{key:'bu',d:'ぶ',r:'ば行'},{key:'be',d:'べ',r:'ば行'},{key:'bo',d:'ぼ',r:'ば行'},
  {key:'pa',d:'ぱ',r:'ぱ行'},{key:'pi',d:'ぴ',r:'ぱ行'},{key:'pu',d:'ぷ',r:'ぱ行'},{key:'pe',d:'ぺ',r:'ぱ行'},{key:'po',d:'ぽ',r:'ぱ行'},
  {key:'xya',d:'ゃ',r:'小文字'},{key:'xyu',d:'ゅ',r:'小文字'},{key:'xyo',d:'ょ',r:'小文字'},{key:'xtsu',d:'っ',r:'小文字'},
  {key:'xa',d:'ぁ',r:'小文字'},{key:'xi',d:'ぃ',r:'小文字'},{key:'xu',d:'ぅ',r:'小文字'},{key:'xe',d:'ぇ',r:'小文字'},{key:'xo',d:'ぉ',r:'小文字'},
];

const LABEL_FILENAME = {
  'a':'01_notmove_a','i':'02_notmove_i','u':'03_notmove_u','e':'04_notmove_e','o':'05_notmove_o',
  'ka':'06_notmove_ka','ki':'07_notmove_ki','ku':'08_notmove_ku','ke':'09_notmove_ke','ko':'10_notmove_ko',
  'sa':'11_notmove_sa','shi':'12_notmove_shi','su':'13_notmove_su','se':'14_notmove_se','so':'15_notmove_so',
  'ta':'16_notmove_ta','chi':'17_notmove_chi','tsu':'18_notmove_tsu','te':'19_notmove_te','to':'20_notmove_to',
  'na':'21_notmove_na','ni':'22_notmove_ni','nu':'23_notmove_nu','ne':'24_notmove_ne','no':'25_move_no',
  'ha':'26_notmove_ha','hi':'27_notmove_hi','fu':'28_notmove_fu','he':'29_notmove_he','ho':'30_notmove_ho',
  'ma':'31_notmove_ma','mi':'32_notmove_mi','mu':'33_notmove_mu','me':'34_notmove_me','mo':'35_notmove_mo',
  'ya':'36_notmove_ya','yu':'37_notmove_yu','yo':'38_notmove_yo',
  'ra':'39_notmove_ra','ri':'40_move_ri','ru':'41_notmove_ru','re':'42_notmove_re','ro':'43_notmove_ro',
  'wa':'44_notmove_wa','wo':'45_move_wo','n':'46_move_n','bar':'47_move_bar',
  'ga':'48_move_ga','gi':'49_move_gi','gu':'50_move_gu','ge':'51_move_ge','go':'52_move_go',
  'za':'53_move_za','ji':'54_move_ji','zu':'55_move_zu','ze':'56_move_ze','zo':'57_move_zo',
  'da':'58_move_da','di':'59_move_di','du':'60_move_du','de':'61_move_de','do':'62_move_do',
  'ba':'63_move_ba','bi':'64_move_bi','bu':'65_move_bu','be':'66_move_be','bo':'67_move_bo',
  'pa':'68_move_pa','pi':'69_move_pi','pu':'70_move_pu','pe':'71_move_pe','po':'72_move_po',
  'xya':'73_move_xya','xyu':'74_move_xyu','xyo':'75_move_xyo','xtsu':'76_move_xtsu',
  'xa':'77_move_xa','xi':'78_move_xi','xu':'79_move_xu','xe':'80_move_xe','xo':'81_move_xo',
};

const STATIC_LABELS = new Set([
  'a','i','u','e','o','ka','ki','ku','ke','ko','sa','shi','su','se','so',
  'ta','chi','tsu','te','to','na','ni','nu','ne','ha','hi','fu','he','ho',
  'ma','mi','mu','me','mo','ya','yu','yo','ra','re','ro','ru','wa','X'
]);

// ══════════════════════════════════════
// 状態
// ══════════════════════════════════════
let landmarker = null, stream = null, rafId = null;
let samples = [], lastSavedAt = 0, lastHanded = null;
let isRecording = false, recordStartAt = 0, recordFrames = [];
const targetFps = 30;
let stableBuffer = [], stableCount = 0;
let currentLabel = 'a';
const downloadedLabels = new Set();

// カウントダウン
let countdownActive = false, countdownEnd = 0, countdownDone = false;

// 開始前安定（カウントダウン発動条件）
let preStableStart = 0; // 安定が始まった時刻（0=未開始）

// リズムモード
let rhythmActive = false, rhythmNextBeat = 0, rhythmFired = 0;
const RING_CIRC = 213.6;

// 推論間引き
let lastDetectTime = 0, lastRes = null;
const DETECT_INTERVAL = 50;

// ══════════════════════════════════════
// DOM
// ══════════════════════════════════════
const $ = id => document.getElementById(id);
const video = $('video'), canvas = $('canvas');
const olLabel = $('olLabel'), olCount = $('olCount'), olGoal = $('olGoal');
const olType = $('olType'), olStatus = $('olStatus');
const cdOverlay = $('cdOverlay'), cdNum = $('cdNum');
const recFlash = $('recFlash'), progressBar = $('progressBar');
const rhythmOl = $('rhythmOl');
const bottomInfo = $('bottomInfo');

// ══════════════════════════════════════
// グリッド生成
// ══════════════════════════════════════
function buildGrid() {
  const container = $('gridScroll');
  container.innerHTML = '';
  let currentRow = null, currentRowItems = null;

  for (const lb of LABELS) {
    if (!currentRow || currentRow !== lb.r) {
      currentRow = lb.r;
      const rowDiv = document.createElement('div');
      rowDiv.className = 'grid-row';
      const rowLabel = document.createElement('div');
      rowLabel.className = 'grid-row-label';
      rowLabel.textContent = lb.r;
      rowDiv.appendChild(rowLabel);
      currentRowItems = document.createElement('div');
      currentRowItems.className = 'grid-row-items';
      rowDiv.appendChild(currentRowItems);
      container.appendChild(rowDiv);
    }
    const btn = document.createElement('div');
    btn.className = 'g-btn';
    btn.dataset.key = lb.key;
    btn.textContent = lb.d;
    if (!STATIC_LABELS.has(lb.key)) btn.classList.add('motion-type');
    btn.onclick = () => selectLabel(lb.key);
    currentRowItems.appendChild(btn);
  }
}

function updateGrid() {
  document.querySelectorAll('.g-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.key === currentLabel);
    btn.classList.toggle('done', downloadedLabels.has(btn.dataset.key));
  });
  const doneCount = downloadedLabels.size;
  $('gridProgress').textContent = `${doneCount}/${LABELS.length}`;
}

function selectLabel(key) {
  if (rhythmActive) stopRhythm();
  currentLabel = key;
  samples = [];
  stableBuffer = [];
  stableCount = 0;
  countdownActive = false; countdownDone = false;
  preStableStart = 0;
  cdOverlay.classList.add('hidden');
  updateOverlay();
  updateGrid();
  updateBottomBar();
}

function getGoal() { return parseInt($('goalCount')?.value) || 50; }

function getLabelInfo(key) {
  const lb = LABELS.find(l => l.key === key);
  return lb || {key, d: key, r: '?'};
}

// ══════════════════════════════════════
// オーバーレイ更新
// ══════════════════════════════════════
function updateOverlay() {
  const info = getLabelInfo(currentLabel);
  const isStatic = STATIC_LABELS.has(currentLabel);
  const goal = getGoal();
  olLabel.innerHTML = `<span class="kana">${info.d}</span><span class="sub">${info.key} ─ ${isStatic?'静止型':'非静止型'}</span>`;
  olCount.innerHTML = `<span class="num">${samples.length}</span>/ ${goal}`;
  olGoal.textContent = goal;
  olType.textContent = isStatic ? '静止型' : '非静止型';
  olType.className = 'overlay-type ' + (isStatic ? 'static' : 'motion');
  progressBar.style.width = Math.min(samples.length / goal * 100, 100) + '%';

  // リズムボタン
  $('btnRhythm').disabled = isStatic || !landmarker;
  rhythmOl.classList.toggle('hidden', !rhythmActive);
}

function updateBottomBar() {
  $('btnDownload').disabled = samples.length === 0;
  $('btnClear').disabled = samples.length === 0;
}

// ══════════════════════════════════════
// MediaPipe初期化
// ══════════════════════════════════════
async function initLandmarker() {
  olStatus.textContent = 'MediaPipe 初期化中...';
  const fileset = await FilesetResolver.forVisionTasks(WASM_BASE);
  landmarker = await HandLandmarker.createFromOptions(fileset, {
    baseOptions: { modelAssetPath: MODEL_URL },
    runningMode: "VIDEO",
    numHands: 1
  });
  olStatus.textContent = 'MediaPipe 準備完了';
}

// カメラ列挙
async function enumerateCameras() {
  // 一度getUserMediaしないとラベルが取れないブラウザがある
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    tmp.getTracks().forEach(t => t.stop());
  } catch(e) { /* ignore */ }
  const devices = await navigator.mediaDevices.enumerateDevices();
  const cams = devices.filter(d => d.kind === 'videoinput');
  const sel = $('cameraSelect');
  sel.innerHTML = '';
  if (cams.length === 0) {
    sel.innerHTML = '<option value="">カメラが見つかりません</option>';
    return;
  }
  cams.forEach((cam, i) => {
    const opt = document.createElement('option');
    opt.value = cam.deviceId;
    opt.textContent = cam.label || `カメラ ${i + 1}`;
    sel.appendChild(opt);
  });
}

async function startCamera() {
  olStatus.textContent = 'カメラ起動中...';
  const deviceId = $('cameraSelect').value;
  const videoConstraints = deviceId
    ? { deviceId: { exact: deviceId }, width: { ideal: 320 }, height: { ideal: 240 } }
    : { facingMode: "user", width: { ideal: 320 }, height: { ideal: 240 } };
  stream = await navigator.mediaDevices.getUserMedia({ video: videoConstraints, audio: false });
  video.srcObject = stream;
  await new Promise(r => { video.onloadedmetadata = r; });
  await video.play();
  const w = video.videoWidth || 320, h = video.videoHeight || 240;
  canvas.width = w; canvas.height = h;
  olStatus.textContent = `カメラ準備完了 (${w}x${h})`;

  // カメラ変更後にリスト再取得（ラベルが確定する）
  await enumerateCameras();
  // 使用中のdeviceIdを選択状態にする
  const activeTrack = stream.getVideoTracks()[0];
  if (activeTrack) {
    const settings = activeTrack.getSettings();
    if (settings.deviceId) $('cameraSelect').value = settings.deviceId;
  }
}

function stopAll() {
  if (rafId) cancelAnimationFrame(rafId); rafId = null;
  if (stream) stream.getTracks().forEach(t => t.stop()); stream = null;
  video.srcObject = null;
  if (landmarker) { landmarker.close(); landmarker = null; }
  isRecording = false; recordFrames = []; stableBuffer = []; stableCount = 0; preStableStart = 0;
  if (rhythmActive) stopRhythm();
  countdownActive = false; countdownDone = false; cdOverlay.classList.add('hidden');
}

// ══════════════════════════════════════
// 特徴量
// ══════════════════════════════════════
function toFeature63(landmarks) {
  const mirror = $('mirrorForModel').value === "on";
  const wrist = landmarks[0];
  const pts = landmarks.map(p => ({
    x: (mirror ? (1-p.x) : p.x) - (mirror ? (1-wrist.x) : wrist.x),
    y: p.y - wrist.y, z: p.z - wrist.z
  }));
  let maxd = 0;
  for (const p of pts) { const d = Math.sqrt(p.x*p.x+p.y*p.y+p.z*p.z); if(d>maxd) maxd=d; }
  const s = maxd > 1e-9 ? 1/maxd : 1;
  const vec = [];
  for (const p of pts) vec.push(p.x*s, p.y*s, p.z*s);
  return vec;
}

function resampleTo15(frames) {
  const n = frames.length, target = 15;
  if (n === target) return frames;
  if (n < target) { const r = [...frames]; while(r.length<target) r.push(frames[n-1]); return r; }
  const indices = []; for(let i=0;i<target;i++) indices.push(i*(n-1)/(target-1));
  return indices.map(idx => {
    const i0=Math.floor(idx), i1=Math.min(i0+1,n-1), a=idx-i0;
    return frames[i0].map((v,j) => v*(1-a)+frames[i1][j]*a);
  });
}

// ══════════════════════════════════════
// 描画
// ══════════════════════════════════════
function draw(vid, res) {
  const ctx = canvas.getContext("2d");
  const w = canvas.width, h = canvas.height;
  ctx.save();
  if ($('mirrorView').value === "on") { ctx.translate(w,0); ctx.scale(-1,1); }
  ctx.clearRect(0,0,w,h);
  ctx.drawImage(vid,0,0,w,h);
  if (res?.landmarks?.length > 0) {
    for (const lm of res.landmarks) {
      ctx.strokeStyle = "#4ecca3"; ctx.lineWidth = 2;
      for (const conn of HandLandmarker.HAND_CONNECTIONS) {
        ctx.beginPath();
        ctx.moveTo(lm[conn.start].x*w, lm[conn.start].y*h);
        ctx.lineTo(lm[conn.end].x*w, lm[conn.end].y*h);
        ctx.stroke();
      }
      ctx.fillStyle = "#e94560";
      for (const p of lm) { ctx.beginPath(); ctx.arc(p.x*w,p.y*h,3,0,Math.PI*2); ctx.fill(); }
    }
  }
  ctx.restore();
  if (isRecording) { recFlash.style.opacity = '1'; } else { recFlash.style.opacity = '0'; }
}

// ══════════════════════════════════════
// 手検出ヘルパー
// ══════════════════════════════════════
function handConfidence(res) { return res?.handednesses?.[0]?.[0]?.score ?? 0; }
function pickHand(res) {
  if (!res?.landmarks?.length) return null;
  let idx = 0;
  if ($('rightOnly').value==="on" && res.handednesses?.length) {
    const iR = res.handednesses.findIndex(h => h?.[0]?.categoryName==="Right");
    if (iR >= 0) idx = iR; else return null;
  }
  return { landmarks: res.landmarks[idx], handed: res.handednesses?.[idx]?.[0]?.categoryName ?? "?" };
}

function isStable(landmarks) {
  if (stableBuffer.length === 0) return false;
  const prev = stableBuffer[stableBuffer.length-1];
  let sum = 0;
  for (let i=0;i<21;i++) {
    const dx=landmarks[i].x-prev[i].x, dy=landmarks[i].y-prev[i].y, dz=landmarks[i].z-prev[i].z;
    sum += Math.sqrt(dx*dx+dy*dy+dz*dz);
  }
  return (sum/21) < parseFloat($('stableTh').value);
}

// ══════════════════════════════════════
// 録画
// ══════════════════════════════════════
function startRecording(ts) { isRecording = true; recordStartAt = ts; recordFrames = []; }

function finishRecording(label) {
  if (recordFrames.length === 0) { isRecording = false; return; }
  const frames15 = resampleTo15(recordFrames);
  samples.push({ label, tsMs: Date.now(), handedness: lastHanded, frames: frames15 });
  isRecording = false; recordFrames = []; lastSavedAt = performance.now();
  updateOverlay(); updateBottomBar();

  // 目標達成 → ダウンロード → 次へ
  if (samples.length >= getGoal()) {
    downloadJSONL(samples.slice(), label);
    downloadedLabels.add(label);
    samples = [];
    updateOverlay(); updateGrid(); updateBottomBar();
    advanceToNext();
  }
}

function advanceToNext() {
  const idx = LABELS.findIndex(l => l.key === currentLabel);
  // 次の未完了ラベルを探す
  for (let i = 1; i <= LABELS.length; i++) {
    const next = LABELS[(idx + i) % LABELS.length];
    if (!downloadedLabels.has(next.key)) {
      selectLabel(next.key);
      return;
    }
  }
  olStatus.textContent = '🎉 全クラス完了！';
}

function downloadJSONL(data, lbl) {
  if (!data) { data = samples.slice(); lbl = currentLabel; }
  if (data.length === 0) return;
  const lines = data.map(s => JSON.stringify(s)).join("\n");
  const blob = new Blob([lines], { type: "application/jsonl" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date().toISOString().slice(0,19).replace(/[:-]/g,"").replace("T","_");
  const baseName = LABEL_FILENAME[lbl] || `label_${lbl}`;
  a.href = url; a.download = `${baseName}_${ts}.jsonl`; a.click();
  URL.revokeObjectURL(url);
}

// ══════════════════════════════════════
// カウントダウン
// ══════════════════════════════════════
function startCountdown() {
  const sec = parseInt($('countdownSec').value) || 3;
  if (sec <= 0) return false; // カウントダウンなし、即開始
  countdownActive = true;
  countdownEnd = performance.now() + sec * 1000;
  cdOverlay.classList.remove('hidden');
  cdNum.textContent = sec;
  return true;
}

// ══════════════════════════════════════
// リズムモード
// ══════════════════════════════════════
let rhythmPending = false; // カウントダウン中にリズム待機

function startRhythm() {
  const sec = parseInt($('countdownSec').value) || 3;
  if (sec > 0 && !countdownDone) {
    // カウントダウンを先に実行、完了後にリズム開始
    rhythmPending = true;
    countdownActive = true;
    countdownEnd = performance.now() + sec * 1000;
    cdOverlay.classList.remove('hidden');
    cdNum.textContent = sec;
    $('btnRhythm').textContent = '⏹ リズム停止';
  } else {
    // カウントダウン不要 or 済み → 即開始
    actualStartRhythm();
  }
}

function actualStartRhythm() {
  rhythmActive = true; rhythmFired = 0; rhythmPending = false;
  countdownDone = true;
  rhythmNextBeat = performance.now() + parseInt($('rhythmInterval').value);
  rhythmOl.classList.remove('hidden');
  $('btnRhythm').textContent = '⏹ リズム停止';
}

function stopRhythm() {
  rhythmActive = false; rhythmPending = false;
  rhythmOl.classList.add('hidden');
  $('btnRhythm').textContent = '🎵 リズム';
}

// ══════════════════════════════════════
// メインループ
// ══════════════════════════════════════
function loop() {
  const ts = performance.now();
  const shouldDetect = isRecording || (ts - lastDetectTime >= DETECT_INTERVAL);
  let res;
  if (shouldDetect) {
    res = landmarker.detectForVideo(video, ts);
    lastRes = res; lastDetectTime = ts;
  } else { res = lastRes; }
  if (shouldDetect) draw(video, res);

  const conf = handConfidence(res);
  const hasHand = conf >= parseFloat($('handTh').value);
  const pick = hasHand ? pickHand(res) : null;
  const label = currentLabel;
  const isStaticLabel = STATIC_LABELS.has(label);
  const cd = parseInt($('cooldown').value);
  const cdOk = (ts - lastSavedAt) >= cd;

  // ── リズムリング更新（常時） ──
  if (rhythmActive && !isStaticLabel) {
    const interval = parseInt($('rhythmInterval').value);
    const recMs = parseInt($('recordMs').value);
    const CIRC = 427.3; // 2*PI*68
    const recordRatio = Math.min(recMs / interval, 0.95);
    const greenLen = recordRatio * CIRC;
    const purpleLen = (1 - recordRatio) * CIRC;

    // beat直後からの経過時間
    const beatStart = rhythmNextBeat - interval;
    const elapsed = Math.max(0, ts - beatStart);
    const progress = Math.min(elapsed / interval, 1.0);

    const ringInterval = $('ringInterval');
    const ringRecord = $('ringRecord');
    const ringLabel = $('ringLabel');

    // 撮影フェーズ: 0 → recordRatio
    // 待機フェーズ: recordRatio → 1.0
    if (progress <= recordRatio) {
      // 撮影中 → 緑リングが埋まっていく
      const gp = progress / recordRatio; // 0→1
      ringRecord.setAttribute('stroke-dasharray', `${greenLen} ${CIRC}`);
      ringRecord.setAttribute('stroke-dashoffset', (greenLen * (1 - gp)).toFixed(1));
      ringRecord.style.transform = 'rotate(-90deg)';
      // 紫はまだ非表示
      ringInterval.setAttribute('stroke-dashoffset', purpleLen.toFixed(1));
      ringInterval.setAttribute('stroke-dasharray', `${purpleLen} ${CIRC}`);
      ringInterval.style.transform = `rotate(${-90 + recordRatio * 360}deg)`;
      ringLabel.textContent = '🔴';
      ringLabel.style.color = '#4ecca3';
    } else {
      // 待機中 → 紫リングが埋まっていく
      const wp = (progress - recordRatio) / (1 - recordRatio); // 0→1
      // 緑は満タン
      ringRecord.setAttribute('stroke-dasharray', `${greenLen} ${CIRC}`);
      ringRecord.setAttribute('stroke-dashoffset', '0');
      ringRecord.style.transform = 'rotate(-90deg)';
      // 紫が進行
      ringInterval.setAttribute('stroke-dasharray', `${purpleLen} ${CIRC}`);
      ringInterval.setAttribute('stroke-dashoffset', (purpleLen * (1 - wp)).toFixed(1));
      ringInterval.style.transform = `rotate(${-90 + recordRatio * 360}deg)`;
      const remain = Math.max(0, (rhythmNextBeat - ts) / 1000);
      ringLabel.textContent = remain.toFixed(1);
      ringLabel.style.color = '#bb86fc';
    }
  }

  // ── カウントダウン処理 ──
  if (countdownActive) {
    const remain = Math.max(0, (countdownEnd - ts) / 1000);
    if (remain <= 0) {
      countdownActive = false;
      countdownDone = true;
      cdOverlay.classList.add('hidden');
      // リズム待機中ならリズム開始
      if (rhythmPending) {
        actualStartRhythm();
      }
      olStatus.textContent = '収集中...';
    } else {
      cdNum.textContent = Math.ceil(remain);
      rafId = requestAnimationFrame(loop);
      return;
    }
  }

  // ── 手なし処理 ──
  if (!hasHand || !pick) {
    stableBuffer = []; stableCount = 0; preStableStart = 0;
    if (isRecording && !rhythmActive) {
      isRecording = false; recordFrames = [];
    }
    if (!rhythmActive) {
      olStatus.textContent = hasHand ? '手を検出中...' : '手を映してください';
    }
    // リズムモード：手なしでもビート進行
    if (rhythmActive && !isStaticLabel && !isRecording) {
      const interval = parseInt($('rhythmInterval').value);
      if (ts >= rhythmNextBeat) {
        rhythmFired++; rhythmNextBeat = ts + interval;
        olStatus.textContent = `⚠️ Beat ${rhythmFired} skipped (no hand)`;
        if (rhythmFired >= getGoal()) stopRhythm();
      }
    }
    rafId = requestAnimationFrame(loop);
    return;
  }

  if (pick) lastHanded = pick.handed;
  const features = toFeature63(pick.landmarks);

  // ── 静止型 ──
  if (isStaticLabel) {
    stableBuffer.push(pick.landmarks);
    if (stableBuffer.length > 30) stableBuffer.shift();
    if (isStable(pick.landmarks)) stableCount++; else stableCount = 0;

    const req = parseInt($('stableFrames').value);
    const remain = Math.max(0, req - stableCount);
    const isHandStable = stableCount >= req;

    // 開始前安定トラッキング（カウントダウン前のみ）
    if (!countdownDone && !countdownActive) {
      if (isHandStable) {
        if (preStableStart === 0) preStableStart = ts;
        const preStableSec = parseFloat($('preStableSec').value) || 3;
        const preStableElapsed = (ts - preStableStart) / 1000;
        const preRemain = Math.max(0, preStableSec - preStableElapsed);
        olStatus.textContent = `手を安定させてください... ${preRemain.toFixed(1)}秒`;

        if (preStableElapsed >= preStableSec) {
          // 開始前安定クリア → カウントダウン発動
          const needsCd = startCountdown();
          if (needsCd) { rafId = requestAnimationFrame(loop); return; }
          countdownDone = true; // sec=0の場合
        }
      } else {
        // 安定が途切れたらリセット
        preStableStart = 0;
        olStatus.textContent = `安定: ${stableCount}/${req}  conf=${conf.toFixed(2)}`;
      }
    } else {
      // カウントダウン済み → 通常の収集ステータス
      olStatus.textContent = `安定: ${stableCount}/${req}  conf=${conf.toFixed(2)}`;

      if (isHandStable && !isRecording && cdOk) {
        startRecording(ts);
      }
    }
  }

  // ── リズムモード：ビートトリガー ──
  if (rhythmActive && !isStaticLabel && !isRecording) {
    const interval = parseInt($('rhythmInterval').value);
    if (ts >= rhythmNextBeat) {
      startRecording(ts);
      rhythmNextBeat = ts + interval;
      rhythmFired++;
      olStatus.textContent = `🎵 Beat ${rhythmFired} / ${getGoal()}`;
      if (rhythmFired >= getGoal()) stopRhythm();
    }
  }

  // ── 非静止型（リズムなし）── 手動は旧UIにないので省略、リズム推奨

  // ── 録画中 ──
  if (isRecording) {
    const fi = 1000 / targetFps;
    const elapsed = ts - recordStartAt;
    const recMs = parseInt($('recordMs').value);
    if (recordFrames.length === 0 || elapsed >= recordFrames.length * fi) {
      if (features) recordFrames.push(features);
      else if (recordFrames.length > 0) recordFrames.push(recordFrames[recordFrames.length-1]);
    }
    olStatus.textContent = `🔴 録画中... ${Math.round(elapsed)}/${recMs}ms  (${recordFrames.length}f)`;
    if (elapsed >= recMs) { finishRecording(label); stableCount = 0; stableBuffer = []; }
  }

  rafId = requestAnimationFrame(loop);
}

// ══════════════════════════════════════
// イベント
// ══════════════════════════════════════
$('btnStart').onclick = async () => {
  $('btnStart').disabled = true;
  try {
    await initLandmarker(); await startCamera();
    $('btnStop').disabled = false;
    $('btnRhythm').disabled = STATIC_LABELS.has(currentLabel);
    updateOverlay();
    rafId = requestAnimationFrame(loop);
  } catch(e) {
    olStatus.textContent = 'エラー: ' + e.message;
    $('btnStart').disabled = false;
  }
};

$('btnStop').onclick = () => {
  stopAll();
  $('btnStart').disabled = false;
  $('btnStop').disabled = true;
  $('btnRhythm').disabled = true;
  olStatus.textContent = '停止しました';
};

$('btnRhythm').onclick = () => {
  if (rhythmActive || rhythmPending) {
    stopRhythm();
    countdownActive = false;
    cdOverlay.classList.add('hidden');
  } else {
    startRhythm();
  }
};

// カメラ選択変更時 → 再起動
$('cameraSelect').onchange = async () => {
  if (!stream) return; // カメラ未起動なら何もしない
  // 現在のストリーム停止
  if (rafId) cancelAnimationFrame(rafId); rafId = null;
  stream.getTracks().forEach(t => t.stop()); stream = null;
  video.srcObject = null;
  // 新しいカメラで再起動
  try {
    await startCamera();
    rafId = requestAnimationFrame(loop);
  } catch(e) {
    olStatus.textContent = 'カメラ切替エラー: ' + e.message;
  }
};

$('btnDownload').onclick = () => {
  downloadJSONL(samples.slice(), currentLabel);
  downloadedLabels.add(currentLabel);
  samples = [];
  updateOverlay(); updateGrid(); updateBottomBar();
};

$('btnClear').onclick = () => {
  if (confirm("現在のデータをクリア？")) {
    samples = [];
    updateOverlay(); updateBottomBar();
  }
};

$('optsToggle').onclick = () => {
  $('optsPanel').classList.toggle('collapsed');
  $('optsToggle').textContent = $('optsPanel').classList.contains('collapsed') ? '⚙ オプション ▸' : '⚙ オプション ▾';
};

// ── 初期化 ──
buildGrid();
selectLabel('a');
enumerateCameras();
</script>
